<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <meta name="theme-color" content="#1a0a2e" id="themeColorMeta">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Berk & Dilara">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Berk & Dilara 💜</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0720;
      --surface: #16102b;
      --surface2: #1e1638;
      --accent: #c084fc;
      --accent2: #f472b6;
      --text: #f1e9ff;
      --muted: #8b7aaa;
      --border: rgba(192, 132, 252, 0.15);
      --glow: rgba(192, 132, 252, 0.08);
      --nav-bg: rgba(13, 7, 32, 0.92);
    }

    [data-theme="bordo"] {
      --bg: #0f0508;
      --surface: #1e0a10;
      --surface2: #2a0f18;
      --accent: #e05580;
      --accent2: #f4a0b8;
      --text: #ffeef3;
      --muted: #a06070;
      --border: rgba(224, 85, 128, 0.15);
      --glow: rgba(224, 85, 128, 0.08);
      --nav-bg: rgba(15, 5, 8, 0.92);
    }

    [data-theme="gri"] {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --accent: #c0c0c0;
      --accent2: #e8e0d8;
      --text: #f0f0f0;
      --muted: #707070;
      --border: rgba(192, 192, 192, 0.15);
      --glow: rgba(192, 192, 192, 0.08);
      --nav-bg: rgba(10, 10, 10, 0.92);
    }

    [data-theme="gs"] {
      --bg: #0a0500;
      --surface: #150b00;
      --surface2: #1f1200;
      --accent: #e8a000;
      --accent2: #e82020;
      --text: #fff8ee;
      --muted: #a07840;
      --border: rgba(232, 160, 0, 0.18);
      --glow: rgba(232, 160, 0, 0.08);
      --nav-bg: rgba(10, 5, 0, 0.92);
    }

    [data-theme="bjk"] {
      --bg: #050505;
      --surface: #101010;
      --surface2: #1a1a1a;
      --accent: #f0f0f0;
      --accent2: #b0b0b0;
      --text: #ffffff;
      --muted: #606060;
      --border: rgba(240, 240, 240, 0.15);
      --glow: rgba(240, 240, 240, 0.06);
      --nav-bg: rgba(5, 5, 5, 0.92);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* Stars background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 8%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 88%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 90%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 100px;
    }

    #page-home {
      padding-bottom: 100px;
    }

    /* Header */
    .header {
      position: relative;
      width: 100%;
      height: 320px;
      overflow: hidden;
      margin-bottom: 0;
    }

    .header-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
    }

    .header-fade {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.08) 0%,
        transparent 20%,
        transparent 40%,
        var(--bg) 100%
      );
    }

    .header-content {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0 24px 20px;
      text-align: center;
    }

    .header-emoji {
      font-size: 28px;
      margin-bottom: 6px;
      display: block;
      animation: pulse 3s ease-in-out infinite;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
      text-shadow: none;
      filter: drop-shadow(0 2px 12px rgba(0,0,0,0.6));
    }

    /* Main counter */
    .counter-card {
      margin: 0 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .counter-card::before {
      content: '';
      position: absolute;
      top: -40px; left: 50%; transform: translateX(-50%);
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(192,132,252,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .counter-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .counter-number {
      font-family: 'Playfair Display', serif;
      font-size: 72px;
      font-weight: 400;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .counter-unit {
      font-size: 18px;
      color: var(--muted);
      font-weight: 300;
    }

    .counter-since {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .counter-since span {
      color: var(--text);
      font-weight: 500;
    }

    /* Detail row */
    .detail-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 0 20px 24px;
    }

    .detail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 16px;
      text-align: center;
    }

    .detail-card .num {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .detail-card .lbl {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    /* Section */
    .section {
      margin: 0 20px 8px;
    }

    .section-title {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      padding-left: 4px;
    }

    /* Event cards */
    .event-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .event-card.soon {
      border-color: rgba(244, 114, 182, 0.4);
      background: linear-gradient(135deg, var(--surface), rgba(244,114,182,0.05));
    }

    .event-card.today {
      border-color: rgba(192, 132, 252, 0.6);
      background: linear-gradient(135deg, var(--surface), rgba(192,132,252,0.1));
      animation: glow-pulse 2s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(192,132,252,0); }
      50% { box-shadow: 0 0 20px 2px rgba(192,132,252,0.15); }
    }

    .event-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .event-info { flex: 1; min-width: 0; }

    .event-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-date {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .event-countdown {
      text-align: right;
      flex-shrink: 0;
    }

    .event-days {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .event-days-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .badge-today {
      font-size: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: color-mix(in srgb, var(--bg) 85%, transparent);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      padding: 12px 0 20px;
      display: flex;
      justify-content: space-around;
      z-index: 999;
    }

    .nav-btn {
      background: none;
      border: none;
      color: var(--muted);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 20px;
      border-radius: 12px;
      transition: color 0.2s;
    }

    .nav-btn.active, .nav-btn:active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* Notification button */
    .notif-btn {
      display: block;
      width: calc(100% - 40px);
      margin: 0 20px 20px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--accent);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, border-color 0.2s;
    }

    .notif-btn:active { background: var(--surface2); }
    .notif-btn.enabled { color: var(--muted); border-style: dashed; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%; transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* Responsive tweaks */
    @media (max-height: 700px) {
      .counter-number { font-size: 56px; }
      .header { padding: 32px 24px 20px; }
    }

    /* Settings panel */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .settings-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .settings-panel {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 20px 24px 48px;
      z-index: 1001;
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .settings-panel.open {
      transform: translateX(-50%) translateY(0);
    }
    .settings-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .settings-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      margin-bottom: 20px;
      color: var(--text);
    }
    .settings-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .theme-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    .theme-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .theme-btn.active {
      border-color: var(--accent);
    }
    .theme-btn .swatch {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .theme-btn .swatch-mor {
      background: linear-gradient(135deg, #c084fc, #f472b6);
    }
    .theme-btn .swatch-bordo {
      background: linear-gradient(135deg, #e05580, #f4a0b8);
    }
    .theme-btn .swatch-gri {
      background: linear-gradient(135deg, #c0c0c0, #e8e0d8);
    }
    .theme-btn .swatch-gs {
      background: linear-gradient(135deg, #e8a000, #e82020);
    }
    .theme-btn .swatch-bjk {
      background: linear-gradient(135deg, #f0f0f0, #303030);
    }
    .theme-btn span {
      font-size: 12px;
      color: var(--text);
      font-weight: 500;
    }


    /* Page switching - fixed full screen, kendi içinde scroll */
    .page {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      z-index: 1;
    }
    .page.active {
      display: block;
    }

    .memories-page {
      padding: 20px 20px 100px;
      max-width: 430px;
      margin: 0 auto;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      padding-left: 4px;
    }

    .memory-input-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .memory-input-card textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      resize: none;
      min-height: 80px;
      line-height: 1.6;
    }

    .memory-input-card textarea::placeholder {
      color: var(--muted);
    }

    .memory-input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .author-select {
      display: flex;
      gap: 8px;
    }

    .author-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .author-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border-color: transparent;
    }

    .send-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 20px;
      padding: 8px 20px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    .send-btn:disabled {
      opacity: 0.4;
    }

    .memory-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 10px;
    }

    .memory-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .memory-author {
      font-size: 12px;
      font-weight: 500;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .memory-date {
      font-size: 11px;
      color: var(--muted);
    }

    .memory-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6;
    }

    .memory-delete {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s;
    }
    .memory-delete:active { color: #e05555; }

    .memories-empty {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 40px 0;
    }

    .memories-loading {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 20px 0;
    }


    /* Bugün Ne Yapsak Panel */
    .bny-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .bny-overlay.open { opacity: 1; pointer-events: all; }

    .bny-panel {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 430px;
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      padding: 20px 24px 120px;
      z-index: 160;
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .bny-panel.open { transform: translateX(-50%) translateY(0); }

    .bny-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }

    .bny-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--text);
      margin-bottom: 16px;
      text-align: center;
    }

    .bny-category {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .bny-cat-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 10px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .bny-cat-btn .cat-emoji { font-size: 24px; }
    .bny-cat-btn.active {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface);
    }

    .bny-spin-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 16px;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 16px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .bny-spin-btn:active { transform: scale(0.98); }
    .bny-spin-btn:disabled { opacity: 0.4; }

    .bny-result {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }

    .bny-result-emoji {
      font-size: 36px;

<script>
  const START_DATE = new Date('2026-02-12T00:00:00');

  const EVENTS = [
    { name: 'Yıldönümümüz', emoji: '💜', month: 2, day: 12 },
    { name: "Dilara'nın Doğum Günü", emoji: '🎂', month: 8, day: 9 },
    { name: "Berk'in Doğum Günü", emoji: '🎉', month: 3, day: 15 },
    { name: "Cengiz'in Sahiplenme Günü", emoji: '🐹', month: 6, day: 25 },
    { name: "Cengiz'i Anma Günü", emoji: '🕯️', month: 11, day: 10 },
    { name: 'Sevgililer Günü', emoji: '💝', month: 2, day: 14 },
    { name: 'Kadınlar Günü', emoji: '🌸', month: 3, day: 8 },
  ];

  function today() {
    const d = new Date();
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function updateCounter() {
    const now = today();
    const diff = Math.floor((now - START_DATE) / 86400000);
    document.getElementById('dayCount').textContent = diff;
    document.getElementById('weekCount').textContent = Math.floor(diff / 7);
    document.getElementById('monthCount').textContent = Math.floor(diff / 30.44);
  }

  function nextOccurrence(month, day) {
    const now = today();
    const year = now.getFullYear();
    let d = new Date(year, month - 1, day);
    d.setHours(0, 0, 0, 0);
    // Bugün dahil, sadece dünden önce ise gelecek yıla al
    if (d < now) d = new Date(year + 1, month - 1, day);
    return d;
  }

  function isTodayEvent(month, day) {
    const now = new Date();
    return now.getMonth() + 1 === month && now.getDate() === day;
  }

  function daysUntil(date) {
    return Math.round((date - today()) / 86400000);
  }

  function formatDate(month, day) {
    const months = ['Oca', 'Şub', 'Mar', 'Nis', 'May', 'Haz', 'Tem', 'Ağu', 'Eyl', 'Eki', 'Kas', 'Ara'];
    return `${day} ${months[month - 1]}`;
  }

  function renderEvents() {
    const list = document.getElementById('eventsList');

    const sorted = EVENTS.map(e => {
      const next = nextOccurrence(e.month, e.day);
      const days = daysUntil(next);
      return { ...e, next, days };
    }).sort((a, b) => a.days - b.days);

    list.innerHTML = sorted.map(e => {
      const isToday = e.days === 0;
      const isSoon = e.days > 0 && e.days <= 7;
      const cls = isToday ? 'today' : isSoon ? 'soon' : '';

      const countdown = isToday
        ? `<span class="badge-today">Bugün! 🎉</span>`
        : `<div class="event-days">${e.days}</div><div class="event-days-label">gün kaldı</div>`;

      return `
        <div class="event-card ${cls}">
          <div class="event-icon">${e.emoji}</div>
          <div class="event-info">
            <div class="event-name">${e.name}</div>
            <div class="event-date">${formatDate(e.month, e.day)}</div>
          </div>
          <div class="event-countdown">${countdown}</div>
        </div>
      `;
    }).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  async function requestNotification() {
    if (!('Notification' in window)) {
      showToast('Bu tarayıcı bildirimleri desteklemiyor.');
      return;
    }
    // Zaten aktifse tekrar çalıştırma
    if (localStorage.getItem('notifEnabled') === '1' && Notification.permission === 'granted') {
      showToast('Bildirimler zaten aktif.');
      return;
    }
    const perm = await Notification.requestPermission();
    if (perm === 'granted') {
      document.getElementById('notifBtn').textContent = '✓ Bildirimler aktif';
      document.getElementById('notifBtn').classList.add('enabled');
      localStorage.setItem('notifEnabled', '1');
      // Bugünkü özel günleri kontrol et ve sadece gerçekten bugün olanları bildir
      scheduleNotifications();
      showToast('Bildirimler açıldı! 🎉');
    } else {
      showToast('Bildirim izni verilmedi.');
    }
  }

  function scheduleNotifications() {
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.ready.then(reg => {

      // Bugün olan etkinlikler — sadece bugün bildirildiyse göster
      const todayKey = new Date().toDateString();
      const alreadyNotified = localStorage.getItem('notifiedDate') === todayKey;

      EVENTS.forEach(e => {
        // Bugün mü?
        if (isTodayEvent(e.month, e.day)) {
          // Bugün daha önce bildirilmediyse gönder
          if (!alreadyNotified) {
            reg.showNotification(`${e.name} ${e.emoji}`, {
              body: `Bugün ${e.name}! Kutlu olsun 💜`,
              icon: 'icon-192.png',
              badge: 'icon-192.png',
              tag: e.name
            });
          }
          return;
        }

        // Gelecekteki etkinlikler için setTimeout ile planla
        const next = nextOccurrence(e.month, e.day);
        const dayBefore = new Date(next);
        dayBefore.setDate(dayBefore.getDate() - 1);
        dayBefore.setHours(9, 0, 0, 0);
        next.setHours(9, 0, 0, 0);

        const msUntilDayBefore = dayBefore - Date.now();
        const msUntilDay = next - Date.now();

        // Sadece 1 dakikadan fazla sonrası ise planla
        if (msUntilDayBefore > 60000) {
          setTimeout(() => {
            reg.showNotification(`Yarın: ${e.name} ${e.emoji}`, {
              body: `${e.name} yarın! Hazırlanmaya başla 💜`,
              icon: 'icon-192.png',
              badge: 'icon-192.png',
              tag: `${e.name}-before`
            });
          }, msUntilDayBefore);
        }

        if (msUntilDay > 60000) {
          setTimeout(() => {
            reg.showNotification(`${e.name} ${e.emoji}`, {
              body: `Bugün ${e.name}! Kutlu olsun 💜`,
              icon: 'icon-192.png',
              badge: 'icon-192.png',
              tag: e.name
            });
          }, msUntilDay);
        }
      });

      // Bugün için bildirildi olarak işaretle
      localStorage.setItem('notifiedDate', todayKey);
    });
  }

  let selectedCategory = null;

  function toggleBNY() {
    const panel = document.getElementById('bnyPanel');
    const overlay = document.getElementById('bnyOverlay');

    selectedCategory = cat;
    document.querySelectorAll('.bny-cat-btn').forEach(b => b.classList.remove('active'));

    document.getElementById('bnyResult').innerHTML = '<span class="bny-placeholder">Hazır! Butona bas 🎲</span>';
  }

  // Her kategori için kalan aktivite havuzu
  const remainingPool = { ev: [], disari: [] };

  function getNextActivity(cat) {
    // Havuz bittiyse yeniden doldur (hepsini karıştır)
    if (remainingPool[cat].length === 0) {
      remainingPool[cat] = [...ACTIVITIES[cat]].sort(() => Math.random() - 0.5);
    }
    // Havuzdan bir sonraki aktiviteyi al
    return remainingPool[cat].pop();
  }

  function spinActivity() {
    if (!selectedCategory) return;
    const list = ACTIVITIES[selectedCategory];
    const btn = document.getElementById('bnySpinBtn');
    const result = document.getElementById('bnyResult');

    // Havuzdan adil şekilde seç
    const pick = getNextActivity(selectedCategory);

    // Slot machine animasyonu
    btn.disabled = true;
    const totalDuration = 2500;
    const startInterval = 80;
    const endInterval = 300;
    let elapsed = 0;
    let currentInterval = startInterval;
    let shuffled = [...list].sort(() => Math.random() - 0.5);
    let idx = 0;

    function showNext() {
      const item = shuffled[idx % shuffled.length];
      idx++;
      result.innerHTML = `
        <div class="bny-result-emoji" style="animation:none">${item.emoji}</div>
        <div class="bny-result-text" style="animation:none">${item.text}</div>
      `;
      elapsed += currentInterval;
      currentInterval = startInterval + (endInterval - startInterval) * (elapsed / totalDuration);

      if (elapsed < totalDuration) {
        setTimeout(showNext, currentInterval);
      } else {
        result.innerHTML = `
          <div class="bny-result-emoji">${pick.emoji}</div>
          <div class="bny-result-text">${pick.text}</div>

  // Page navigation
  function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    const el = document.getElementById('page-' + page);
    el.classList.add('active');
    el.scrollTop = 0; // sayfanın kendi scroll'unu sıfırla
    document.getElementById('nav-' + page)?.classList.add('active');
    if (page === 'memories') loadMemories();
  }

  // Author selection
  let selectedAuthor = 'Berk';
  function selectAuthor(name) {
    selectedAuthor = name;
    document.querySelectorAll('.author-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + name.toLowerCase()).classList.add('active');
  }

  // Save memory to Firestore
  async function saveMemory() {
    const text = document.getElementById('memoryText').value.trim();
    if (!text) return;
    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.textContent = 'Kaydediliyor...';
    try {
      await window.dbAddMemory(text, selectedAuthor);
      document.getElementById('memoryText').value = '';
      showToast('Anı kaydedildi 💜');
      loadMemories();
    } catch (e) {
      showToast('Hata: ' + e.message);
    }
    btn.disabled = false;
    btn.textContent = 'Kaydet';
  }

  // Load memories from Firestore
  async function loadMemories() {
    const list = document.getElementById('memoriesList');
    if (!window.firebaseReady) {
      list.innerHTML = '<div class="memories-loading">Bağlanıyor...</div>';
      window.addEventListener('firebaseReady', loadMemories, { once: true });
      return;
    }
    try {
      const memories = await window.dbGetMemories();
      if (memories.length === 0) {
        list.innerHTML = '<div class="memories-empty">Henüz anı yok 💜<br>İlk anıyı sen ekle!</div>';
        return;
      }
      list.innerHTML = memories.map(m => {
        const date = m.createdAt?.toDate?.();
        const dateStr = date ? date.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
        return `
          <div class="memory-card">
            <div class="memory-header">
              <span class="memory-author">${m.author === 'Berk' ? '💙 Berk' : '💗 Dilara'}</span>
              <div style="display:flex;align-items:center;gap:8px;">
                <span class="memory-date">${dateStr}</span>
                <button class="memory-delete" onclick="deleteMemory('${m.id}')" title="Sil">🗑️</button>
              </div>
            </div>
            <div class="memory-text">${m.text}</div>
          </div>
        `;
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="memories-empty">Anılar yüklenemedi.</div>';
    }
  }

  async function deleteMemory(id) {
    if (!confirm('Bu anıyı silmek istediğine emin misin?')) return;
    try {
      await window.dbDeleteMemory(id);
      showToast('Anı silindi.');
      loadMemories();
    } catch (e) {
      showToast('Silinemedi: ' + e.message);
    }
  }

  // Update counter at midnight
  const now = new Date();
  const msToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1) - now;
  setTimeout(() => {
    updateCounter();
    renderEvents();
    setInterval(() => { updateCounter(); renderEvents(); }, 86400000);
  }, msToMidnight);
</script>
</body>
</html>
